<svg width="100%" viewBox="0 0 680 720">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Layer labels (left) -->
<text class="ts" x="32" y="76" text-anchor="middle" dominant-baseline="central">入口层</text>
<text class="ts" x="32" y="168" text-anchor="middle" dominant-baseline="central">记忆层</text>
<text class="ts" x="32" y="286" text-anchor="middle" dominant-baseline="central">编排层</text>
<text class="ts" x="32" y="434" text-anchor="middle" dominant-baseline="central">工具层</text>
<text class="ts" x="32" y="576" text-anchor="middle" dominant-baseline="central">基础设施</text>

<!-- Divider lines -->
<line x1="64" y1="110" x2="640" y2="110" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="3 3"/>
<line x1="64" y1="218" x2="640" y2="218" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="3 3"/>
<line x1="64" y1="378" x2="640" y2="378" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="3 3"/>
<line x1="64" y1="518" x2="640" y2="518" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="3 3"/>

<!-- === 入口层 === -->
<g class="c-gray">
  <rect x="120" y="52" width="420" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="330" y="76" text-anchor="middle" dominant-baseline="central">CLI / API Entrypoint</text>
</g>
<line x1="330" y1="92" x2="330" y2="128" class="arr" stroke-width="0.8" marker-end="url(#arrow)"/>

<!-- === 记忆层 === -->
<!-- Short-term -->
<g class="c-teal">
  <rect x="80" y="128" width="180" height="72" rx="8" stroke-width="0.5"/>
  <text class="th" x="170" y="154" text-anchor="middle" dominant-baseline="central">短期记忆</text>
  <text class="ts" x="170" y="174" text-anchor="middle" dominant-baseline="central">LangGraph State</text>
  <text class="ts" x="170" y="190" text-anchor="middle" dominant-baseline="central">query · docs · route · errors</text>
</g>
<!-- Long-term -->
<g class="c-teal">
  <rect x="280" y="128" width="180" height="72" rx="8" stroke-width="0.5"/>
  <text class="th" x="370" y="154" text-anchor="middle" dominant-baseline="central">长期记忆</text>
  <text class="ts" x="370" y="174" text-anchor="middle" dominant-baseline="central">InMemoryStore / Redis</text>
  <text class="ts" x="370" y="190" text-anchor="middle" dominant-baseline="central">user_prefs · qa_history</text>
</g>
<!-- Checkpointer -->
<g class="c-teal">
  <rect x="480" y="128" width="160" height="72" rx="8" stroke-width="0.5"/>
  <text class="th" x="560" y="154" text-anchor="middle" dominant-baseline="central">Checkpointer</text>
  <text class="ts" x="560" y="174" text-anchor="middle" dominant-baseline="central">SqliteSaver</text>
  <text class="ts" x="560" y="190" text-anchor="middle" dominant-baseline="central">thread_id = user_id</text>
</g>

<line x1="330" y1="200" x2="330" y2="234" class="arr" stroke-width="0.8" marker-end="url(#arrow)"/>

<!-- === 编排层 === -->
<!-- Supervisor -->
<g class="c-purple">
  <rect x="180" y="234" width="300" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="330" y="255" text-anchor="middle" dominant-baseline="central">Supervisor Agent</text>
  <text class="ts" x="330" y="273" text-anchor="middle" dominant-baseline="central">读长期记忆 · 路由分析 · dispatch · 结果汇总</text>
</g>

<!-- Specialist agents -->
<g class="c-blue">
  <rect x="80" y="306" width="130" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="145" y="328" text-anchor="middle" dominant-baseline="central">Hybrid Agent</text>
  <text class="ts" x="145" y="346" text-anchor="middle" dominant-baseline="central">BM25 + 向量检索</text>
</g>
<g class="c-blue">
  <rect x="230" y="306" width="130" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="295" y="328" text-anchor="middle" dominant-baseline="central">GraphRAG Agent</text>
  <text class="ts" x="295" y="346" text-anchor="middle" dominant-baseline="central">多跳 · 子图推理</text>
</g>
<g class="c-blue">
  <rect x="380" y="306" width="130" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="445" y="328" text-anchor="middle" dominant-baseline="central">Answer Agent</text>
  <text class="ts" x="445" y="346" text-anchor="middle" dominant-baseline="central">LCEL 生成链</text>
</g>
<!-- Retry label -->
<g class="c-coral">
  <rect x="530" y="306" width="110" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="585" y="326" text-anchor="middle" dominant-baseline="central">重试策略</text>
  <text class="ts" x="585" y="344" text-anchor="middle" dominant-baseline="central">局部自主重试</text>
  <text class="ts" x="585" y="360" text-anchor="middle" dominant-baseline="central">最多 2 次</text>
</g>

<!-- arrows supervisor to agents -->
<line x1="245" y1="282" x2="145" y2="306" class="arr" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="310" y1="282" x2="295" y2="306" class="arr" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="390" y1="282" x2="445" y2="306" class="arr" stroke-width="0.8" marker-end="url(#arrow)"/>

<!-- retry arrow -->
<path d="M510 334 L530 334" fill="none" stroke="var(--color-text-secondary)" stroke-width="0.8" marker-end="url(#arrow)" stroke-dasharray="3 2"/>

<!-- === 工具层 === -->
<text class="ts" x="330" y="402" text-anchor="middle">Core Tools（统一 async · 白名单隔离）</text>

<g class="c-amber">
  <rect x="80" y="416" width="120" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="140" y="438" text-anchor="middle" dominant-baseline="central">Neo4j Tool</text>
  <text class="ts" x="140" y="456" text-anchor="middle" dominant-baseline="central">统一 driver</text>
</g>
<g class="c-amber">
  <rect x="216" y="416" width="120" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="276" y="438" text-anchor="middle" dominant-baseline="central">Milvus Tool</text>
  <text class="ts" x="276" y="456" text-anchor="middle" dominant-baseline="central">统一 client</text>
</g>
<g class="c-amber">
  <rect x="352" y="416" width="120" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="412" y="438" text-anchor="middle" dominant-baseline="central">LLM Tool</text>
  <text class="ts" x="412" y="456" text-anchor="middle" dominant-baseline="central">LCEL Chain</text>
</g>
<g class="c-amber">
  <rect x="488" y="416" width="120" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="548" y="438" text-anchor="middle" dominant-baseline="central">Memory Tool</text>
  <text class="ts" x="548" y="456" text-anchor="middle" dominant-baseline="central">读写 Store</text>
</g>

<!-- arrows agents to tools -->
<line x1="145" y1="362" x2="145" y2="410" class="arr" stroke-width="0.7" stroke-dasharray="2 2" marker-end="url(#arrow)"/>
<line x1="295" y1="362" x2="295" y2="410" class="arr" stroke-width="0.7" stroke-dasharray="2 2" marker-end="url(#arrow)"/>
<line x1="445" y1="362" x2="412" y2="410" class="arr" stroke-width="0.7" stroke-dasharray="2 2" marker-end="url(#arrow)"/>

<line x1="330" y1="468" x2="330" y2="536" class="arr" stroke-width="0.8" marker-end="url(#arrow)"/>

<!-- === 基础设施层 === -->
<g class="c-gray">
  <rect x="80" y="536" width="160" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="160" y="558" text-anchor="middle" dominant-baseline="central">Neo4j</text>
  <text class="ts" x="160" y="576" text-anchor="middle" dominant-baseline="central">图数据库</text>
</g>
<g class="c-gray">
  <rect x="260" y="536" width="160" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="558" text-anchor="middle" dominant-baseline="central">Milvus</text>
  <text class="ts" x="340" y="576" text-anchor="middle" dominant-baseline="central">向量数据库</text>
</g>
<g class="c-gray">
  <rect x="440" y="536" width="160" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="520" y="558" text-anchor="middle" dominant-baseline="central">SQLite / Redis</text>
  <text class="ts" x="520" y="576" text-anchor="middle" dominant-baseline="central">Checkpointer · Store</text>
</g>

<!-- State flow annotation -->
<text class="ts" x="330" y="638" text-anchor="middle">State 流向：OnlineQAState + UserMemoryState 合并注入每轮 Graph 调用</text>
<text class="ts" x="330" y="658" text-anchor="middle">线程隔离：thread_id = f"{user_id}:{session_id}"，长期记忆 namespace = user_id</text>
<text class="ts" x="330" y="678" text-anchor="middle">重试边界：Agent 内部最多 2 次，超出后 Supervisor 降级路由</text>
</svg>